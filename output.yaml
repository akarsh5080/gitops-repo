---
# Source: app-chart/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-repo-app-chart
  labels:
    helm.sh/chart: app-chart-0.1.0
    app.kubernetes.io/name: app-chart
    app.kubernetes.io/instance: app-repo
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
automountServiceAccountToken: true
---
# Source: app-chart/templates/service-headless.yaml
apiVersion: v1
kind: Service
metadata:
  name: app-repo-app-chart
spec:
  clusterIP: None   # 🔥 THIS MAKES IT STATEFUL
  selector:
    app: app-chart
  ports:
  - port: 80
    targetPort: 80
---
# Source: app-chart/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: app-repo-app-chart
  labels:
    helm.sh/chart: app-chart-0.1.0
    app.kubernetes.io/name: app-chart
    app.kubernetes.io/instance: app-repo
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: app-chart
    app.kubernetes.io/instance: app-repo
---
# Source: app-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-repo-app-chart
  labels:
    helm.sh/chart: app-chart-0.1.0
    app.kubernetes.io/name: app-chart
    app.kubernetes.io/instance: app-repo
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app-chart
      app.kubernetes.io/instance: app-repo
  template:
    metadata:
      labels:
        helm.sh/chart: app-chart-0.1.0
        app.kubernetes.io/name: app-chart
        app.kubernetes.io/instance: app-repo
        app.kubernetes.io/version: "1.16.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      serviceAccountName: app-repo-app-chart
      containers:
        - name: app-chart
          image: "ghcr.io/akarsh5080/app-repo:c62c2c4d162f72a880454e85582f7d3a4aa7cd84"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
---
# Source: app-chart/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "app-repo-app-chart-test-connection"
  labels:
    helm.sh/chart: app-chart-0.1.0
    app.kubernetes.io/name: app-chart
    app.kubernetes.io/instance: app-repo
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['app-repo-app-chart:80']
  restartPolicy: Never
