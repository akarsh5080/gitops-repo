apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami   # 🔥 external helm repo
    chart: postgresql
    targetRevision: 15.5.0

    helm:
      valueFiles:
        - environments/dev/apps/postgres/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
