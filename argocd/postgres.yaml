apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 16.2.3

    helm:   # ✅ MUST be inside source
      values: |
       image:
         registry: docker.io
         repository: bitnami/postgresql
         tag: 16.2.0-debian-12-r0   # ✅ VALID EXISTING TAG

       global:
         imageRegistry: docker.io

        auth:
          username: admin
          password: admin123
          database: mydb

        primary:
          persistence:
            enabled: true
            size: 1Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
