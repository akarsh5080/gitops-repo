apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-routes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akarsh5080/gitops-repo
    targetRevision: HEAD
    path: environments/dev/kong
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
