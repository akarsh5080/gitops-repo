apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-nginx-repo
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/akarsh5080/gitops-repo.git
    targetRevision: HEAD
    path: charts/microservice

    helm:
      valueFiles:
        - ../../environments/dev/apps/service-nginx-repo/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
